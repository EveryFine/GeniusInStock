version: "3"
services: 
  mariadb-master:
    image: mariadb:latest
    container_name: GeniusStockDbService
    restart: always
    ports:
      - "33060:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=${MY_MARIADB_PASSWORD}
      - TZ=Asia/Shanghai
    volumes:
      - /mnt/cfs/genius/InStock/mariadb/data:/var/lib/mysql
    networks:
      - instock_network

networks:
  instock_network:
    driver: bridge